image: alpine/git

pipelines:
  custom:
    sync-from-github:
      - step:
          name: Mirror GitHub to Bitbucket
          script:
            - apk add --no-cache ca-certificates
            - git clone --mirror https://github.com/bhupatcode/ai-reel-generator.git
            - cd ai-reel-generator.git
            - git push --mirror https://x-token-auth:${BITBUCKET_TOKEN}@bitbucket.org/bhupats-coder/ai-reel-generator.git
